services:
  # ── 基础设施 ──

  postgres:
    image: pgvector/pgvector:pg16
    container_name: intelligent-agent-postgres
    environment:
      POSTGRES_USER: intelligent
      POSTGRES_PASSWORD: intelligent
      POSTGRES_DB: intelligent_agent
    ports:
      - "5432:5432"
    volumes:
      - intelligent_agent_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelligent -d intelligent_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: intelligent-agent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: intelligent-agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - intelligent_agent_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: intelligent-agent-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/intelligent-agent

  # ── 应用服务 ──

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: intelligent-agent-api
    env_file: .env.docker
    environment:
      PRISMA_DB_PUSH_FLAGS: --accept-data-loss
      RAG_SERVICE_URL: http://rag:8082
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      rag:
        condition: service_healthy

  rag:
    build:
      context: ..
      dockerfile: infra/Dockerfile.rag
    container_name: intelligent-agent-rag
    env_file: .env.docker
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_AGENT_API_BASE_URL: http://localhost:8080
    container_name: intelligent-agent-web
    environment:
      AGENT_API_INTERNAL_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  intelligent_agent_pg_data:
  intelligent_agent_minio_data:
