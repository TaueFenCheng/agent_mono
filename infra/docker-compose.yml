services:
  postgres:
    image: postgres:16
    container_name: tang-agent-postgres
    environment:
      POSTGRES_USER: tang
      POSTGRES_PASSWORD: tang
      POSTGRES_DB: tang_agent
    ports:
      - "5432:5432"
    volumes:
      - tang_agent_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tang -d tang_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: tang-agent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tang_agent_pg_data:
