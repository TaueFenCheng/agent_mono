services:
  # ── 基础设施 ──

  postgres:
    image: pgvector/pgvector:pg16
    container_name: intelligent-agent-postgres
    environment:
      POSTGRES_USER: intelligent
      POSTGRES_PASSWORD: intelligent
      POSTGRES_DB: intelligent_agent
    ports:
      - "5432:5432"
    volumes:
      - intelligent_agent_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelligent -d intelligent_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: intelligent-agent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: intelligent-agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - intelligent_agent_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 应用服务 ──

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: intelligent-agent-api
    env_file: .env.docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_AGENT_API_BASE_URL: http://localhost:8080
    container_name: intelligent-agent-web
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  intelligent_agent_pg_data:
  intelligent_agent_minio_data:
